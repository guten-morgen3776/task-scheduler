name = "task-scheduler"
compatibility_date = "2026-05-12"

# Serve the Vite build output as static assets. `not_found_handling =
# "single-page-application"` rewrites unknown paths to index.html so React
# Router can handle client-side routes (e.g. /login, /settings).
[assets]
directory = "./frontend/dist"
not_found_handling = "single-page-application"
