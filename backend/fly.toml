# fly.io configuration for task-scheduler backend.
# Adjust `app` to a globally-unique name before the first `flyctl launch`.

# CHANGE THIS to something unique on Fly (the placeholder is taken).
app = "super-ultra-task-solver"
primary_region = "nrt"

[build]

[env]
  APP_ENV = "prod"
  DATABASE_URL = "sqlite+aiosqlite:////mnt/data/app.db"
  # PUBLIC_BACKEND_URL / PUBLIC_FRONTEND_URL / TOKEN_ENCRYPTION_KEY /
  # GOOGLE_CREDENTIALS_PATH are set via `flyctl secrets`.

[[mounts]]
  source = "task_scheduler_data"
  destination = "/mnt/data"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [http_service.concurrency]
    type = "requests"
    soft_limit = 20
    hard_limit = 25

[[vm]]
  size = "shared-cpu-1x"
  memory = "256mb"
